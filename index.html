<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Spor Analiz Sistemi · Yapay Zeka Koç</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --teal: #00e5cc;
      --teal-dim: #00bfa5;
      --pink: #ff4081;
      --yellow: #ffd600;
      --green: #69ff47;
      --red: #ff1744;
      --orange: #ff9100;
      --bg: #050a0e;
      --bg2: #0a1520;
      --bg3: #0f1e2e;
      --border: #1a3040;
      --text: #cce8e0;
      --text-dim: #5a8a80;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html,
    body {
      height: 100%;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      padding: 10px 10px calc(10px + var(--safe-bot));
      padding-top: calc(10px + var(--safe-top));
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 6px;
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-icon {
      font-size: 28px;
    }
    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(16px, 4vw, 26px);
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--teal);
      line-height: 1;
      text-shadow: 0 0 15px rgba(0, 229, 204, 0.4);
    }
    .subtitle {
      font-size: 8px;
      color: var(--text-dim);
      letter-spacing: 2px;
      display: block;
    }
    .header-stats {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .stat-pill {
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 4px 10px;
      font-size: 9px;
      letter-spacing: 1px;
      white-space: nowrap;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stat-pill span {
      font-size: 14px;
      font-weight: 700;
    }
    #fps-val {
      color: var(--yellow);
    }
    #time-val {
      color: var(--teal);
    }
    #cal-val {
      color: var(--orange);
    }
    #model-badge {
      color: var(--text-dim);
      transition: color 0.4s, border-color 0.4s;
      font-size: 8px;
    }
    #model-badge.ready {
      color: var(--green);
      border-color: var(--green);
      text-shadow: 0 0 8px rgba(105, 255, 71, 0.5);
    }
    #model-badge.error {
      color: var(--red);
      border-color: var(--red);
    }

    /* ── EGZERSİZ SEÇİCİ ── */
    .exercise-selector {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 4px 0 8px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      flex-shrink: 0;
    }
    .exercise-selector::-webkit-scrollbar {
      display: none;
    }
    .ex-btn {
      flex-shrink: 0;
      padding: 8px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 6px;
      white-space: nowrap;
      user-select: none;
      -webkit-user-select: none;
    }
    .ex-btn:active {
      transform: scale(0.96);
    }
    .ex-btn.active {
      background: var(--teal);
      color: var(--bg);
      border-color: var(--teal);
      box-shadow: 0 0 15px rgba(0, 229, 204, 0.4);
      font-weight: 700;
    }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 10px;
      align-items: start;
      flex: 1;
      min-height: 0;
    }
    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    /* ── KAMERA ── */
    .cam-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .canvas-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--bg2);
      border: 1px solid var(--border);
      overflow: hidden;
      border-radius: 8px;
    }
    @media (min-width: 861px) {
      .canvas-wrap {
        aspect-ratio: 4/3;
        max-height: 70vh;
      }
    }
    .grid-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: linear-gradient(rgba(0, 229, 204, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 204, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .corner {
      position: absolute;
      width: 16px;
      height: 16px;
      z-index: 10;
    }
    .corner.tl {
      top: 5px;
      left: 5px;
      border-top: 2px solid var(--teal);
      border-left: 2px solid var(--teal);
    }
    .corner.tr {
      top: 5px;
      right: 5px;
      border-top: 2px solid var(--teal);
      border-right: 2px solid var(--teal);
    }
    .corner.bl {
      bottom: 5px;
      left: 5px;
      border-bottom: 2px solid var(--teal);
      border-left: 2px solid var(--teal);
    }
    .corner.br {
      bottom: 5px;
      right: 5px;
      border-bottom: 2px solid var(--teal);
      border-right: 2px solid var(--teal);
    }
    #webcam,
    #output_canvas {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
    }
    #webcam.mirror,
    #output_canvas.mirror {
      transform: rotateY(180deg);
      -webkit-transform: rotateY(180deg);
    }
    #output_canvas {
      z-index: 2;
    }
    .cam-flip-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 20;
      width: 38px;
      height: 38px;
      background: rgba(10, 21, 32, 0.85);
      border: 1px solid var(--teal-dim);
      color: var(--teal);
      font-size: 18px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.2s;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .cam-flip-btn.visible {
      display: flex;
    }
    .cam-flip-btn:active {
      transform: scale(0.9) rotate(180deg);
      background: rgba(0, 229, 204, 0.25);
    }
    @media (min-width: 861px) {
      .cam-flip-btn {
        display: none !important;
      }
    }
    .cam-label {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--teal-dim);
      background: rgba(5, 10, 14, 0.7);
      padding: 2px 8px;
      pointer-events: none;
      display: none;
      border-radius: 4px;
    }
    .cam-label.visible {
      display: block;
    }
    .placeholder {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.5s;
    }
    .placeholder.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .ph-icon {
      font-size: 40px;
      color: var(--border);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,
      100% {
        opacity: 0.3;
        transform: scale(1);
      }
      50% {
        opacity: 0.7;
        transform: scale(1.05);
      }
    }
    .placeholder p {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-align: center;
    }

    /* ── ALIŞTIRMA REHBERİ (Canvas üstü) ── */
    .guide-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      display: none;
    }
    .guide-overlay.visible {
      display: block;
    }

    /* ── KONTROL BUTONLARI ── */
    .cam-controls {
      display: flex;
      gap: 6px;
    }
    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 12px;
      border: none;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      font-weight: 700;
      transition: all 0.2s;
      min-height: 44px;
      border-radius: 8px;
      user-select: none;
      -webkit-user-select: none;
    }
    .btn:active {
      transform: scale(0.97);
    }
    .btn-reset {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-reset:hover {
      border-color: var(--teal-dim);
      color: var(--teal);
    }
    .btn-shot {
      background: var(--bg3);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-shot:hover {
      border-color: var(--teal-dim);
      color: var(--teal);
    }
    .btn-voice {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 16px;
      min-width: 44px;
      flex: 0;
    }
    .btn-voice.on {
      border-color: var(--yellow);
      color: var(--yellow);
      background: rgba(255, 214, 0, 0.1);
    }

    /* ── SAĞ PANEL ── */
    .metrics-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: calc(100vh - 150px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    @media (max-width: 860px) {
      .metrics-panel {
        max-height: none;
        overflow-y: visible;
      }
    }
    .metrics-panel::-webkit-scrollbar {
      width: 3px;
    }
    .metrics-panel::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* Kart stilleri */
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      animation: cardIn 0.3s ease;
    }
    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--teal);
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-title .icon {
      font-size: 18px;
    }
    .big-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 48px;
      font-weight: 900;
      color: var(--teal);
      line-height: 1;
      text-shadow: 0 0 20px rgba(0, 229, 204, 0.5);
      text-align: center;
    }
    .big-label {
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-align: center;
      margin-top: 2px;
    }
    .two-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .mini-stat {
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 8px;
      border-radius: 6px;
      text-align: center;
    }
    .mini-stat .val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--yellow);
    }
    .mini-stat .lbl {
      font-size: 7px;
      letter-spacing: 1px;
      color: var(--text-dim);
    }
    .form-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: var(--bg3);
      border-radius: 6px;
      margin-top: 4px;
    }
    .form-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .form-dot.good {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }
    .form-dot.warn {
      background: var(--yellow);
      box-shadow: 0 0 8px var(--yellow);
    }
    .form-dot.bad {
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
    }
    .form-msg {
      font-size: 10px;
      letter-spacing: 0.5px;
      color: var(--text);
    }
    .progress-wrap {
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
    }
    .progress-bar {
      height: 100%;
      background: var(--teal);
      border-radius: 3px;
      transition: width 0.3s;
      width: 0%;
    }
    .set-row {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .set-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: var(--text-dim);
    }
    .set-dot.done {
      background: var(--teal);
      color: var(--bg);
      border-color: var(--teal);
    }
    .set-dot.current {
      border-color: var(--yellow);
      color: var(--yellow);
      animation: blink2 1s infinite;
    }
    @keyframes blink2 {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.4;
      }
    }
    #no-person {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 20px;
      color: var(--text-dim);
      font-size: 10px;
      letter-spacing: 1px;
      border: 1px dashed var(--border);
      border-radius: 8px;
    }
    #no-person .icon {
      font-size: 28px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-area">
      <span class="logo-icon">🏋️</span>
      <div>
        <h1>SPOR ANALİZ KOÇU</h1>
        <span class="subtitle">Yapay zeka ile form kontrolü · tekrar sayacı</span>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat-pill">⏱ <span id="time-val">00:00</span></div>
      <div class="stat-pill">🔥 <span id="cal-val">0</span> kcal</div>
      <div class="stat-pill">FPS <span id="fps-val">0</span></div>
      <div class="stat-pill" id="model-badge">● MODEL</div>
    </div>
  </header>

  <!-- Egzersiz seçici -->
  <div class="exercise-selector" id="exerciseSelector">
    <button class="ex-btn active" data-ex="squat">🏋️ SQUAT</button>
    <button class="ex-btn" data-ex="pushup">💪 ŞINAV</button>
    <button class="ex-btn" data-ex="plank">🧘 PLANK</button>
    <button class="ex-btn" data-ex="lunge">🦵 LUNGE</button>
    <button class="ex-btn" data-ex="jumpingjack">⭐ JUMPING JACK</button>
    <button class="ex-btn" data-ex="free">🔍 SERBEST</button>
  </div>

  <div class="layout">
    <div class="cam-section">
      <div class="canvas-wrap" id="canvasWrap">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div class="grid-overlay"></div>
        <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
        <button class="cam-flip-btn" id="btnFlip" title="Kamerayı Çevir">⟳</button>
        <div class="cam-label" id="camLabel">ÖN KAMERA</div>
        <div class="placeholder hidden" id="placeholder">
          <div class="ph-icon">📷</div>
          <p>Kamera başlatılıyor...</p>
        </div>
      </div>
      <div id="noCamWarn" style="display:none;font-size:9px;color:var(--yellow);padding:4px 8px;background:rgba(255,214,0,.08);border:1px solid rgba(255,214,0,.2);">⚠ Arka kamera bulunamadı, ön kamera kullanılıyor.</div>
      <div class="cam-controls">
        <button class="btn btn-reset" id="btnReset">↺ SIFIRLA</button>
        <button class="btn btn-shot" id="btnShot">📸 EKRAN GÖRÜNTÜSÜ</button>
        <button class="btn btn-voice" id="btnVoice" title="Sesli koçluk">🔊</button>
      </div>
    </div>

    <div class="metrics-panel" id="metricsPanel">
      <div id="no-person">
        <div class="icon">🧑</div>
        <p>Kameraya doğru konumlanın</p>
      </div>
    </div>
  </div>

<script type="module">

// ── 0. polyfill ────────────────────────────────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r = 0) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    this.beginPath();
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    this.closePath();
    return this;
  };
}

// ── 1. IMPORTS ─────────────────────────────────────────────────────────────────
import {
  PoseLandmarker,
  FilesetResolver,
  DrawingUtils
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

// ── 2. DOM ────────────────────────────────────────────────────────────────────
const video = document.getElementById("webcam");
const canvas = document.getElementById("output_canvas");
const ctx = canvas.getContext("2d");
const btnFlip = document.getElementById("btnFlip");
const btnShot = document.getElementById("btnShot");
const btnReset = document.getElementById("btnReset");
const btnVoice = document.getElementById("btnVoice");
const placeholder = document.getElementById("placeholder");
const modelBadge = document.getElementById("model-badge");
const fpsVal = document.getElementById("fps-val");
const timeVal = document.getElementById("time-val");
const calVal = document.getElementById("cal-val");
const metricsPanel = document.getElementById("metricsPanel");
const noPersonEl = document.getElementById("no-person");
const canvasWrap = document.getElementById("canvasWrap");
const camLabel = document.getElementById("camLabel");
const noCamWarn = document.getElementById("noCamWarn");
const exerciseSelector = document.getElementById("exerciseSelector");

let drawUtils;

// ── 3. STATE ───────────────────────────────────────────────────────────────────
let poseLM;
let running = false;
let lastTime = -1;
let fpsCnt = 0;
let fpsT = performance.now();
let currentFacing = "user";
let hasMultipleCams = false;
let voiceEnabled = false;

// Egzersiz state
let currentExercise = "squat";
let repCount = 0;
let setCount = 1;
const MAX_SETS = 3;
let repState = "up"; // 'up' | 'down'
let goodReps = 0;
let badReps = 0;
let formScore = 100;
let formMessages = [];
let plankStartTime = null;
let plankHoldDuration = 0;
let lastPlankCheck = 0;
let jumpingJackState = "closed"; // 'closed' | 'open'
let jumpingJackCount = 0;
let exerciseStartTime = Date.now();
let totalCalories = 0;
let lastCalorieUpdate = Date.now();
const CALORIES_PER_MIN = { squat: 7, pushup: 5, plank: 3, lunge: 6, jumpingjack: 8, free: 4 };

// ── 4. KAMERA ─────────────────────────────────────────────────────────────────
async function checkCameras() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === "videoinput");
    hasMultipleCams = cams.length > 1;
  } catch (e) {
    hasMultipleCams = false;
  }
}
checkCameras();

async function startCamera(facing = "user") {
  video.srcObject?.getTracks().forEach(t => t.stop());
  video.srcObject = null;
  noCamWarn.style.display = "none";

  const isBack = facing === "environment";
  const constraints = {
    video: {
      facingMode: { ideal: facing },
      width: { ideal: isBack ? 1920 : 1280 },
      height: { ideal: isBack ? 1080 : 720 },
    }
  };

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia(constraints);
  } catch (e) {
    if (facing === "environment") {
      noCamWarn.style.display = "block";
      currentFacing = "user";
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }
        });
      } catch (e2) { throw e2; }
    } else { throw e; }
  }

  const track = stream.getVideoTracks()[0];
  const settings = track.getSettings();
  if (settings.facingMode) currentFacing = settings.facingMode;

  updateMirror();
  video.srcObject = stream;
  return new Promise((res, rej) => {
    video.onloadeddata = async () => {

    video.onerror = rej;

}

// ── 6. GEOMETRY ───────────────────────────────────────────────────────────────
function angle(A, B, C) {
  const bax = A.x - B.x, bay = A.y - B.y;
  const bcx = C.x - B.x, bcy = C.y - B.y;
  const mag = Math.hypot(bax, bay) * Math.hypot(bcx, bcy);
  if (!mag) return null;
  return Math.round(Math.acos(Math.max(-1, Math.min(1, (bax * bcx + bay * bcy) / mag))) * 180 / Math.PI);
}
function dist(A, B) { return Math.hypot(A.x - B.x, A.y - B.y); }
function mid(A, B) { return { x: (A.x + B.x) / 2, y: (A.y + B.y) / 2 }; }

// ── 7. EXERCISE LOGIC ─────────────────────────────────────────────────────────
function analyzeSquat(lm) {
  const hip = mid(lm[23], lm[24]);
  const knee = mid(lm[25], lm[26]);
  const ankle = mid(lm[27], lm[28]);
  const shoulder = mid(lm[11], lm[12]);

  const kneeAngle = angle(lm[23], lm[25], lm[27]); // sol diz
  const kneeAngleR = angle(lm[24], lm[26], lm[28]); // sağ diz
  const avgKneeAngle = kneeAngle !== null && kneeAngleR !== null ? Math.round((kneeAngle + kneeAngleR) / 2) : null;
  const hipAngle = angle(shoulder, hip, knee);
  const backAngle = angle(lm[11], lm[23], lm[25]); // sırt-diz

  const messages = [];
  let quality = 100;

  if (avgKneeAngle !== null) {
    if (avgKneeAngle < 70) { messages.push("Çok alçaldınız, dizler aşırı bükülü"); quality -= 25; }
    else if (avgKneeAngle > 110) { messages.push("Daha alçalın, paralel hedefleyin"); quality -= 20; }
    else if (avgKneeAngle >= 80 && avgKneeAngle <= 100) { messages.push("✅ Mükemmel derinlik!"); }
    else { messages.push("Derinlik idare eder"); quality -= 5; }
  }
  if (backAngle !== null && backAngle < 50) { messages.push("Sırtınız fazla eğik, dik durun"); quality -= 20; }
  if (hipAngle !== null && hipAngle < 60) { messages.push("Kalçanızı daha geriye itin"); quality -= 15; }

  return { avgKneeAngle, hipAngle, backAngle, messages, quality: Math.max(0, quality) };
}

function analyzePushup(lm) {
  const shoulder = mid(lm[11], lm[12]);
  const elbow = mid(lm[13], lm[14]);
  const wrist = mid(lm[15], lm[16]);
  const hip = mid(lm[23], lm[24]);
  const ankle = mid(lm[27], lm[28]);

  const elbowAngle = angle(lm[11], lm[13], lm[15]);
  const elbowAngleR = angle(lm[12], lm[14], lm[16]);
  const avgElbowAngle = elbowAngle !== null && elbowAngleR !== null ? Math.round((elbowAngle + elbowAngleR) / 2) : null;
  const bodyLineAngle = angle(shoulder, hip, ankle);

  const messages = [];
  let quality = 100;

  if (avgElbowAngle !== null) {
    if (avgElbowAngle < 60) { messages.push("Çok alçaldınız"); quality -= 20; }
    else if (avgElbowAngle > 130) { messages.push("Daha fazla inin, 90° hedef"); quality -= 25; }
    else if (avgElbowAngle >= 80 && avgElbowAngle <= 100) { messages.push("✅ Mükemmel derinlik!"); }
    else { messages.push("Derinlik idare eder"); quality -= 5; }
  }
  if (bodyLineAngle !== null) {
    if (bodyLineAngle < 160) { messages.push("Beliniz çöküyor, vücudu düz tutun"); quality -= 30; }
    else if (bodyLineAngle > 185) { messages.push("Kalçanız havada, düz olun"); quality -= 25; }
    else { messages.push("✅ Vücut düzgün"); }
  }

  return { avgElbowAngle, bodyLineAngle, messages, quality: Math.max(0, quality) };
}

function analyzePlank(lm) {
  const shoulder = mid(lm[11], lm[12]);
  const hip = mid(lm[23], lm[24]);
  const ankle = mid(lm[27], lm[28]);
  const bodyAngle = angle(shoulder, hip, ankle);

  const messages = [];
  let quality = 100;

  if (bodyAngle !== null) {
    if (bodyAngle < 165) { messages.push("Kalçanız çöküyor, yukarı kaldırın"); quality -= 35; }
    else if (bodyAngle > 190) { messages.push("Kalçanız havada, düzleştirin"); quality -= 30; }
    else if (bodyAngle >= 170 && bodyAngle <= 185) { messages.push("✅ Mükemmel plank formu!"); }
    else { messages.push("Form idare eder"); quality -= 10; }
  }

  return { bodyAngle, messages, quality: Math.max(0, quality) };
}

function analyzeLunge(lm) {
  const frontKnee = angle(lm[23], lm[25], lm[27]);
  const backKnee = angle(lm[24], lm[26], lm[28]);
  const torso = angle(lm[11], lm[23], lm[25]);

  const messages = [];
  let quality = 100;

  if (frontKnee !== null) {
    if (frontKnee < 70) { messages.push("Ön diz çok bükülü"); quality -= 25; }
    else if (frontKnee > 110) { messages.push("Ön diz yeterince bükülmemiş"); quality -= 20; }
    else if (frontKnee >= 80 && frontKnee <= 100) { messages.push("✅ Ön diz açısı ideal"); }
  }
  if (backKnee !== null && backKnee > 140) { messages.push("Arka dizi daha fazla indirin"); quality -= 15; }
  if (torso !== null && torso < 60) { messages.push("Gövdeniz fazla eğik"); quality -= 20; }

  return { frontKnee, backKnee, torso, messages, quality: Math.max(0, quality) };
}

function analyzeJumpingJack(lm) {
  const lShoulder = lm[11], rShoulder = lm[12];
  const lHip = lm[23], rHip = lm[24];
  const lAnkle = lm[27], rAnkle = lm[28];

  const armSpread = dist(lShoulder, rShoulder);
  const legSpread = dist(lAnkle, rAnkle);
  const hipDist = dist(lHip, rHip);

  const messages = [];
  let quality = 100;

  const armOpen = armSpread > 0.35;
  const legOpen = legSpread > 0.3;

  if (armOpen && legOpen) {
    messages.push("✅ Açık pozisyon");
    quality = 95;
  } else if (!armOpen && !legOpen) {
    messages.push("Kapalı pozisyon");
    quality = 95;
  } else if (armOpen && !legOpen) {
    messages.push("Kollar açık ama bacaklar kapalı");
    quality = 60;
  } else if (!armOpen && legOpen) {
    messages.push("Bacaklar açık ama kollar kapalı");
    quality = 60;
  }

  return { armSpread, legSpread, armOpen, legOpen, messages, quality };
}

function analyzeFree(lm) {
  return { messages: ["Serbest mod - izleniyorsunuz"], quality: 100 };
}

function analyzeExercise(lm) {
  switch (currentExercise) {
    case "squat": return analyzeSquat(lm);
    case "pushup": return analyzePushup(lm);
    case "plank": return analyzePlank(lm);
    case "lunge": return analyzeLunge(lm);
    case "jumpingjack": return analyzeJumpingJack(lm);
    default: return analyzeFree(lm);
  }
}

// ── 8. REP DETECTION ──────────────────────────────────────────────────────────
function detectRep(exercise, analysis) {
  if (exercise === "squat") {
    const angle = analysis.avgKneeAngle;
    if (angle === null) return;
    if (repState === "up" && angle < 85) { repState = "down"; }
    else if (repState === "down" && angle > 140) {
      repState = "up";
      repCount++;
      if (analysis.quality >= 70) goodReps++;
      else badReps++;
      formScore = Math.round((goodReps / Math.max(1, repCount)) * 100);
      if (repCount >= 12 && setCount < MAX_SETS) { setCount++; repCount = 0; goodReps = 0; badReps = 0; }
      speakIfGood(analysis);
    }
  } else if (exercise === "pushup") {
    const angle = analysis.avgElbowAngle;
    if (angle === null) return;
    if (repState === "up" && angle < 90) { repState = "down"; }
    else if (repState === "down" && angle > 150) {
      repState = "up";
      repCount++;
      if (analysis.quality >= 70) goodReps++;
      else badReps++;
      formScore = Math.round((goodReps / Math.max(1, repCount)) * 100);
      if (repCount >= 15 && setCount < MAX_SETS) { setCount++; repCount = 0; goodReps = 0; badReps = 0; }
      speakIfGood(analysis);
    }
  } else if (exercise === "lunge") {
    const angle = analysis.frontKnee;
    if (angle === null) return;
    if (repState === "up" && angle < 90) { repState = "down"; }
    else if (repState === "down" && angle > 150) {
      repState = "up";
      repCount++;
      if (analysis.quality >= 70) goodReps++;
      else badReps++;
      formScore = Math.round((goodReps / Math.max(1, repCount)) * 100);
      if (repCount >= 10 && setCount < MAX_SETS) { setCount++; repCount = 0; goodReps = 0; badReps = 0; }
      speakIfGood(analysis);
    }
  } else if (exercise === "jumpingjack") {
    if (analysis.armOpen && analysis.legOpen && jumpingJackState === "closed") {
      jumpingJackState = "open";
    } else if (!analysis.armOpen && !analysis.legOpen && jumpingJackState === "open") {
      jumpingJackState = "closed";
      jumpingJackCount++;
      repCount = jumpingJackCount;
      if (analysis.quality >= 70) goodReps++;
      else badReps++;
      formScore = Math.round((goodReps / Math.max(1, repCount)) * 100);
      speakIfGood(analysis);
    }
  } else if (exercise === "plank") {
    // Plank: süre sayacı
    if (analysis.quality >= 70) {
      if (plankStartTime === null) plankStartTime = Date.now();
      plankHoldDuration = Math.floor((Date.now() - plankStartTime) / 1000);
    } else {
      if (plankStartTime !== null && Date.now() - lastPlankCheck > 3000) {
        plankStartTime = null;
      }
    }
    lastPlankCheck = Date.now();
    repCount = plankHoldDuration;
  }
}

// ── 9. VOICE COACH ────────────────────────────────────────────────────────────
function speakIfGood(analysis) {
  if (!voiceEnabled) return;
  const msg = analysis.messages.find(m => m.includes("✅"));
  if (msg) {
    const utterance = new SpeechSynthesisUtterance(msg.replace("✅ ", ""));
    utterance.lang = "tr-TR";
    utterance.rate = 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);
  }
}
function speakWarning(msg) {
  if (!voiceEnabled) return;
  const utterance = new SpeechSynthesisUtterance(msg);
  utterance.lang = "tr-TR";
  utterance.rate = 0.95;
  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

// ── 10. CALORIES ──────────────────────────────────────────────────────────────
function updateCalories() {
  const now = Date.now();
  const elapsedMin = (now - lastCalorieUpdate) / 60000;
  const rate = CALORIES_PER_MIN[currentExercise] || 4;
  totalCalories += rate * elapsedMin;
  lastCalorieUpdate = now;
  calVal.textContent = Math.round(totalCalories);
}

function updateUI(analysis) {
  const mainCounter = document.getElementById("mainCounter");
  if (mainCounter) {
    mainCounter.textContent = currentExercise === 'plank' ? formatTime(repCount) : repCount;

  const formDot = document.getElementById("formDot");
  const formMsg = document.getElementById("formMsg");
  const formBar = document.getElementById("formBar");
  const formMessages = document.getElementById("formMessages");

  if (formDot && formMsg && formBar) {
    if (analysis.quality >= 80) {
      formDot.className = "form-dot good";
      formMsg.textContent = "Formunuz harika!";
    } else if (analysis.quality >= 50) {
      formDot.className = "form-dot warn";
      formMsg.textContent = "Formunuzu düzeltin";
    } else {
      formDot.className = "form-dot bad";
      formMsg.textContent = "Form bozuk, dikkat!";
    }
    formBar.style.width = analysis.quality + "%";
    formBar.style.background = analysis.quality > 70 ? "var(--green)" : analysis.quality > 40 ? "var(--yellow)" : "var(--red)";
  }

  if (formMessages) {
    formMessages.innerHTML = analysis.messages.map(m => `<div style="font-size:9px;color:var(--text);margin:2px 0;">${m}</div>`).join("");
  }

  // Set progress
  const setProgress = document.getElementById("setProgress");
  if (setProgress) setProgress.style.width = (setCount / MAX_SETS) * 100 + "%";

  // Uyarı sesleri
  const warnings = analysis.messages.filter(m => !m.includes("✅") && !m.includes("idare"));
  if (warnings.length > 0 && voiceEnabled && Math.random() < 0.1) {
    speakWarning(warnings[0]);
  }
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}

// ── 12. MAIN LOOP ─────────────────────────────────────────────────────────────
function predict() {
  if (!running) return;
  fpsCnt++;
  const now = performance.now();
  if (now - fpsT >= 500) {
    fpsVal.textContent = Math.round(fpsCnt * 1000 / (now - fpsT));
    fpsCnt = 0;
    fpsT = now;
  }

  // Süre güncelle
  const elapsed = Math.floor((Date.now() - exerciseStartTime) / 1000);
  timeVal.textContent = formatTime(elapsed);

  // Kalori güncelle
  updateCalories();

  if (lastTime !== video.currentTime) {
    lastTime = video.currentTime;
    if (canvas.width !== video.videoWidth) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
    }

    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (currentFacing === "user") {
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
    }

    const pR = poseLM.detectForVideo(video, now);
    const pLMs = pR.landmarks ?? [];

    if (pLMs.length > 0) {
      noPersonEl.style.display = "none";
      const lm = pLMs[0];

      // Çizim
      ctx.shadowColor = "#00e5cc";
      ctx.shadowBlur = 10;
      drawUtils.drawConnectors(lm, PoseLandmarker.POSE_CONNECTIONS, { color: "#00e5cc", lineWidth: 3 });
      drawUtils.drawLandmarks(lm, { color: "#fff", fillColor: "#00e5cc", lineWidth: 1, radius: 4 });
      ctx.shadowBlur = 0;

      // Analiz
      const analysis = analyzeExercise(lm);
      detectRep(currentExercise, analysis);
      formMessages = analysis.messages;

      // İsim etiketi
      ctx.restore();
      ctx.save();
      const mx = (lm[11].x + lm[12].x) / 2;
      const my = Math.min(lm[11].y, lm[12].y) - 0.05;
      const labelXPos = currentFacing === "user" ? (1 - mx) * canvas.width : mx * canvas.width;
      const labelYPos = my * canvas.height;
      ctx.font = "bold 16px 'Barlow Condensed', sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const name = currentExercise.toUpperCase();
      const tw = ctx.measureText(name).width + 16;
      ctx.fillStyle = "rgba(5,10,14,0.88)";
      ctx.roundRect(labelXPos - tw / 2, labelYPos - 12, tw, 24, 6);
      ctx.fill();
      ctx.strokeStyle = "#00e5cc";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = "#00e5cc";
      ctx.shadowColor = "#00e5cc";
      ctx.shadowBlur = 10;
      ctx.fillText(name, labelXPos, labelYPos);
      ctx.restore();

      if (currentFacing === "user") { ctx.save();
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1); }

      // Açı etiketleri
      if (currentExercise === "squat" && analysis.avgKneeAngle) {
        const knee = mid(lm[25], lm[26]);
        drawLabel(knee.x, knee.y, `${analysis.avgKneeAngle}°`, "#ffd600");
      }
      if (currentExercise === "pushup" && analysis.avgElbowAngle) {
        const elbow = mid(lm[13], lm[14]);
        drawLabel(elbow.x, elbow.y, `${analysis.avgElbowAngle}°`, "#ffd600");
      }
      if (currentExercise === "lunge" && analysis.frontKnee) {
        drawLabel(lm[25].x, lm[25].y, `${analysis.frontKnee}°`, "#ffd600");
      }
      if (currentExercise === "plank" && analysis.bodyAngle) {
        const hip = mid(lm[23], lm[24]);
        drawLabel(hip.x, hip.y, `${analysis.bodyAngle}°`, "#ffd600");
      }

      updateUI(analysis);
    } else {
      noPersonEl.style.display = "flex";
      if (document.getElementById("mainCounter")) {
        metricsPanel.innerHTML = "";
        metricsPanel.appendChild(noPersonEl);
      }
    }

    ctx.restore();
  }
  requestAnimationFrame(predict);
}

function drawLabel(nx, ny, text, color) {
  const x = currentFacing === "user" ? (1 - nx) * canvas.width : nx * canvas.width;
  const y = ny * canvas.height;
  ctx.save();
  ctx.font = "bold 12px 'Space Mono', monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  const tw = ctx.measureText(text).width + 10;
  ctx.fillStyle = "rgba(5,10,14,0.85)";
  ctx.roundRect(x - tw / 2, y - 7, tw, 16, 3);
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 5;
  ctx.fillText(text, x, y);
  ctx.restore();
}

  const btn = e.target.closest(".ex-btn");
  if (!btn) return;
  document.querySelectorAll(".ex-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentExercise = btn.dataset.ex;
  // Reset
  btnReset.click();
  buildMetricsPanel();
});

// ── 14. INIT ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    placeholder.classList.remove("hidden");
    await setupModels();
    // Otomatik kamera başlat
    currentFacing = "user";
    await startCamera(currentFacing);
    running = true;
    placeholder.classList.add("hidden");
    const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
    if (isMobile || hasMultipleCams) btnFlip.classList.add("visible");

    buildMetricsPanel();
    exerciseStartTime = Date.now();
    lastCalorieUpdate = Date.now();
    predict();
  } catch (e) {
    console.error("Başlatma hatası:", e);
    placeholder.classList.remove("hidden");
    placeholder.querySelector("p").textContent = "Kamera başlatılamadı. Lütfen sayfayı yenileyip kamera izni verin.";
    modelBadge.textContent = "● HATA";
    modelBadge.classList.add("error");
  }
}

// Sayfa yüklenir yüklenmez başlat
init();

// Ekran döndüğünde
window.addEventListener("orientationchange", () => {
  if (running) {
    setTimeout(async () => { try { await startCamera(currentFacing); } catch (e) {} }, 400);
  }
});

</script>
